lockfileVersion: '9.0'

settings:
  autoInstallPeers: true
  excludeLinksFromLockfile: false

importers:

  .:
    devDependencies: {}

  packages/web:
    dependencies:
      '@acme/ui':
        specifier: ^1.2.0
        version: 1.2.0
      '@acme/utils':
        specifier: ^0.5.0
        version: 0.5.0
      react:
        specifier: ^18.2.0
        version: 18.2.0
      react-dom:
        specifier: ^18.2.0
        version: 18.2.0(react@18.2.0)
    devDependencies:
      typescript:
        specifier: ^5.1.6
        version: 5.1.6
      vite:
        specifier: ^4.4.7
        version: 4.4.7(@types/node@20.4.5)

  packages/api:
    dependencies:
      '@acme/utils':
        specifier: ^0.5.0
        version: 0.5.0
    devDependencies:
      typescript:
        specifier: ^5.1.6
        version: 5.1.6

packages:

  '@acme/ui@1.2.0':
    resolution: {integrity: sha512-stub}
    dependencies:
      '@acme/utils': 0.5.0
      react: 18.2.0

  '@acme/utils@0.5.0':
    resolution: {integrity: sha512-stub}

  'react@18.2.0':
    resolution: {integrity: sha512-stub}
