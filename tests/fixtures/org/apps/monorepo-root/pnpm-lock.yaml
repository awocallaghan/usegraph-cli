lockfileVersion: '9.0'

settings:
  autoInstallPeers: true
  excludeLinksFromLockfile: false

importers:

  .:
    devDependencies:
      typescript:
        specifier: ^5.1.6
        version: 5.1.6

  packages/ui:
    dependencies:
      react:
        specifier: ^18.2.0
        version: 18.2.0
    devDependencies:
      '@acme/utils':
        specifier: ^0.5.0
        version: 0.5.0

  packages/web:
    dependencies:
      '@acme/ui':
        specifier: ^1.2.0
        version: 1.2.0
      '@acme/utils':
        specifier: ^0.5.0
        version: 0.5.0
      react:
        specifier: ^18.2.0
        version: 18.2.0
      react-dom:
        specifier: ^18.2.0
        version: 18.2.0(react@18.2.0)

packages:

  '@acme/ui@1.2.0':
    resolution: {integrity: sha512-stub}
    dependencies:
      react: 18.2.0

  '@acme/utils@0.5.0':
    resolution: {integrity: sha512-stub}

  'react@18.2.0':
    resolution: {integrity: sha512-stub}
    engines: {node: '>=0.10.0'}

  'react-dom@18.2.0':
    resolution: {integrity: sha512-stub}
    peerDependencies:
      react: ^18.2.0

  'typescript@5.1.6':
    resolution: {integrity: sha512-stub}
    engines: {node: '>=14.17'}
    hasBin: true
